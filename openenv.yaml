name: "Autonomous Logistics Intelligence Environment"
version: "1.0.0"
description: "An OpenEnv-compliant RL environment orchestrating deterministic real-world constrained logistics simulations."
repository: "openenv-logistics"

server:
  host: "0.0.0.0"
  port: 8000
  framework: "fastapi"
  startup_command: "uvicorn app:app --host 0.0.0.0 --port 8000"

endpoints:
  reset:
    path: "/reset"
    method: "POST"
  step:
    path: "/step"
    method: "POST"
  read_state:
    path: "/state"
    method: "GET"

obs_space:
  type: "dict"
  description: "Serialized JSON graph representation containing edges, nodes, package lists and priorities."

action_space:
  type: "dict"
  schema:
    action_type: ["move", "pickup", "deliver", "wait"]
    target: "string (optional)"

metadata:
  deterministic: true
  supports_seeds: true

tasks:
  - id: "delivery_rate"
    name: "Overall Delivery Rate"
    description: "Fraction of packages successfully delivered"
    difficulty: "easy"
    grader: "grader:grade_delivery"
  - id: "priority_accuracy"
    name: "Urgent Deadline Accuracy"
    description: "Fraction of urgent packages delivered on time"
    difficulty: "medium"
    grader: "grader:grade_priority"
  - id: "fuel_efficiency"
    name: "Fuel Efficiency"
    description: "Remaining fuel relative to maximum capacity"
    difficulty: "hard"
    grader: "grader:grade_fuel"
